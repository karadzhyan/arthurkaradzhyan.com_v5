<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none">
  <!-- Abstract legal/analytical illustration for hero panel -->
  <!-- Grid pattern base -->
  <defs>
    <linearGradient id="fade-down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.06"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="0.06"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8aa39e" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8aa39e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="80" y1="0" x2="80" y2="800"/>
    <line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="0" y1="500" x2="400" y2="500"/>
    <line x1="0" y1="600" x2="400" y2="600"/>
    <line x1="0" y1="700" x2="400" y2="700"/>
  </g>

  <!-- Abstract bar chart -->
  <g transform="translate(60, 180)">
    <rect x="0" y="80" width="24" height="120" fill="url(#accent-grad)" rx="2"/>
    <rect x="36" y="40" width="24" height="160" fill="rgba(138,163,158,0.2)" rx="2"/>
    <rect x="72" y="100" width="24" height="100" fill="rgba(138,163,158,0.12)" rx="2"/>
    <rect x="108" y="20" width="24" height="180" fill="rgba(138,163,158,0.15)" rx="2"/>
    <rect x="144" y="60" width="24" height="140" fill="rgba(138,163,158,0.25)" rx="2"/>
    <rect x="180" y="90" width="24" height="110" fill="rgba(138,163,158,0.1)" rx="2"/>
    <!-- Trend line -->
    <polyline points="12,70 48,30 84,90 120,10 156,50 192,80" stroke="#8aa39e" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
    <!-- Axis -->
    <line x1="0" y1="200" x2="204" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- Scale of justice abstraction -->
  <g transform="translate(120, 480)">
    <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(138,163,158,0.25)" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="130" y2="30" stroke="rgba(138,163,158,0.2)" stroke-width="1.5"/>
    <!-- Left pan -->
    <path d="M20,30 L10,60 Q30,70 50,60 Z" fill="rgba(138,163,158,0.08)" stroke="rgba(138,163,158,0.15)" stroke-width="1"/>
    <!-- Right pan (higher = defense wins) -->
    <path d="M120,30 L110,50 Q130,58 150,50 Z" fill="rgba(138,163,158,0.12)" stroke="rgba(138,163,158,0.2)" stroke-width="1"/>
    <!-- Base -->
    <polygon points="65,80 95,80 85,90 75,90" fill="rgba(138,163,158,0.1)"/>
  </g>

  <!-- Connected nodes / network -->
  <g transform="translate(40, 620)">
    <circle cx="60" cy="20" r="6" fill="rgba(138,163,158,0.2)" stroke="rgba(138,163,158,0.3)" stroke-width="1"/>
    <circle cx="160" cy="40" r="8" fill="rgba(138,163,158,0.15)" stroke="rgba(138,163,158,0.25)" stroke-width="1"/>
    <circle cx="100" cy="80" r="5" fill="rgba(138,163,158,0.12)" stroke="rgba(138,163,158,0.2)" stroke-width="1"/>
    <circle cx="260" cy="30" r="4" fill="rgba(138,163,158,0.1)" stroke="rgba(138,163,158,0.15)" stroke-width="1"/>
    <circle cx="200" cy="90" r="7" fill="rgba(138,163,158,0.18)" stroke="rgba(138,163,158,0.28)" stroke-width="1"/>
    <circle cx="300" cy="70" r="5" fill="rgba(138,163,158,0.08)" stroke="rgba(138,163,158,0.15)" stroke-width="1"/>
    <line x1="60" y1="20" x2="160" y2="40" stroke="rgba(138,163,158,0.12)" stroke-width="0.75"/>
    <line x1="160" y1="40" x2="100" y2="80" stroke="rgba(138,163,158,0.1)" stroke-width="0.75"/>
    <line x1="160" y1="40" x2="260" y2="30" stroke="rgba(138,163,158,0.08)" stroke-width="0.75"/>
    <line x1="160" y1="40" x2="200" y2="90" stroke="rgba(138,163,158,0.1)" stroke-width="0.75"/>
    <line x1="260" y1="30" x2="300" y2="70" stroke="rgba(138,163,158,0.06)" stroke-width="0.75"/>
    <line x1="200" y1="90" x2="300" y2="70" stroke="rgba(138,163,158,0.08)" stroke-width="0.75"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="320" cy="120" r="40" stroke="rgba(138,163,158,0.08)" stroke-width="1" fill="none"/>
  <circle cx="320" cy="120" r="30" stroke="rgba(138,163,158,0.06)" stroke-width="0.75" fill="none"/>
  <circle cx="60" cy="440" r="50" stroke="rgba(138,163,158,0.06)" stroke-width="1" fill="none"/>
  <circle cx="60" cy="440" r="35" stroke="rgba(138,163,158,0.04)" stroke-width="0.75" fill="none"/>

  <!-- Accent dots -->
  <circle cx="320" cy="120" r="3" fill="#8aa39e" opacity="0.3"/>
  <circle cx="80" cy="200" r="2" fill="#8aa39e" opacity="0.25"/>
  <circle cx="240" cy="500" r="2.5" fill="#8aa39e" opacity="0.2"/>
  <circle cx="160" cy="300" r="2" fill="#8aa39e" opacity="0.15"/>
</svg>
