<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c3e3a"/>
      <stop offset="1" stop-color="#1e2d2a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Decorative bar chart on right -->
  <g transform="translate(850, 140)">
    <rect x="0" y="120" width="32" height="200" fill="rgba(138,163,158,0.15)" rx="2"/>
    <rect x="48" y="60" width="32" height="260" fill="rgba(138,163,158,0.2)" rx="2"/>
    <rect x="96" y="160" width="32" height="160" fill="rgba(138,163,158,0.1)" rx="2"/>
    <rect x="144" y="40" width="32" height="280" fill="rgba(138,163,158,0.25)" rx="2"/>
    <rect x="192" y="100" width="32" height="220" fill="rgba(138,163,158,0.12)" rx="2"/>
    <polyline points="16,110 64,50 112,150 160,30 208,90" stroke="#8aa39e" stroke-width="2" stroke-opacity="0.35" fill="none"/>
  </g>

  <!-- AK monogram -->
  <text x="80" y="180" font-family="Georgia, serif" font-size="64" font-weight="700" fill="rgba(138,163,158,0.12)" letter-spacing="-2">AK</text>

  <!-- Name -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="56" fill="white" letter-spacing="-1">Arthur Karadzhyan</text>

  <!-- Title line -->
  <rect x="80" y="310" width="60" height="2" fill="#8aa39e" opacity="0.5"/>

  <!-- Title -->
  <text x="80" y="360" font-family="sans-serif" font-size="16" fill="#8aa39e" letter-spacing="6" text-transform="uppercase">EMPLOYMENT DEFENSE ATTORNEY</text>

  <!-- Description -->
  <text x="80" y="410" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">PAGA Defense  ·  Wage-and-Hour Litigation  ·  California</text>

  <!-- Bottom stats -->
  <g transform="translate(80, 510)">
    <text x="0" y="0" font-family="sans-serif" font-size="28" font-weight="700" fill="#8aa39e">8</text>
    <text x="0" y="20" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">TOOLS</text>

    <text x="120" y="0" font-family="sans-serif" font-size="28" font-weight="700" fill="#8aa39e">12</text>
    <text x="120" y="20" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">PUBLICATIONS</text>

    <text x="280" y="0" font-family="sans-serif" font-size="28" font-weight="700" fill="#8aa39e">12</text>
    <text x="280" y="20" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">CASE ANALYSES</text>

    <text x="460" y="0" font-family="sans-serif" font-size="28" font-weight="700" fill="#8aa39e">6</text>
    <text x="460" y="20" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">INDUSTRIES</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="#8aa39e" opacity="0.3"/>

  <!-- URL -->
  <text x="80" y="590" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="3">ARTHURKARADZHYAN.COM</text>
</svg>
